<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PascalDream — 創作工坊</title>
  <meta name="description" content="PascalDream 小說創作平台 — 設定、角色與正文閱覽">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    (function() {
      var SITE_VERSION = '0.1.2';
      var stored = localStorage.getItem('site_version');
      if (stored && stored !== SITE_VERSION) {
        localStorage.setItem('site_version', SITE_VERSION);
        location.reload(true);
      } else {
        localStorage.setItem('site_version', SITE_VERSION);
      }
    })();
  </script>
  
  <!-- Docsify Dark Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css">
  
  <!-- Google Fonts: Noto Serif TC for body, Inter for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===== ROOT VARIABLES ===== */
    :root {
      --base-font-family: 'Noto Serif TC', 'Georgia', serif;
      --ui-font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      
      /* Dark theme colors */
      --bg-color: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2129;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-warm: #f0883e;
      --accent-red: #ff6b6b;
      --border-color: #30363d;
      --sidebar-bg: #0d1117;
      --sidebar-border: #21262d;
    }

    /* ===== GLOBAL ===== */
    * { box-sizing: border-box; }
    
    body {
      background: var(--bg-color) !important;
      color: var(--text-primary) !important;
      font-family: var(--base-font-family) !important;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: var(--sidebar-bg) !important;
      border-right: 1px solid var(--sidebar-border) !important;
      font-family: var(--ui-font-family) !important;
    }

    .sidebar-nav {
      padding: 0.5rem 0 !important;
    }

    .sidebar-nav > ul > li {
      margin-bottom: 0 !important;
    }

    .sidebar-nav li a {
      color: var(--text-secondary) !important;
      font-size: 0.88rem !important;
      padding: 4px 12px !important;
      transition: all 0.2s ease !important;
      border-radius: 6px !important;
      margin: 1px 6px !important;
      display: block !important;
      line-height: 1.5 !important;
    }

    .sidebar-nav li a:hover {
      color: var(--text-primary) !important;
      background: var(--bg-secondary) !important;
    }

    .sidebar-nav li.active > a {
      color: var(--accent) !important;
      background: rgba(88, 166, 255, 0.1) !important;
      font-weight: 600 !important;
    }

    .sidebar-nav li > p {
      color: var(--text-muted) !important;
      font-size: 0.78rem !important;
      letter-spacing: 0.5px !important;
      padding: 10px 12px 4px !important;
      margin: 0 6px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      line-height: 1.4 !important;
    }

    /* ===== SIDEBAR COLLAPSE ===== */
    .sidebar-nav .folder {
      cursor: pointer !important;
    }

    .sidebar-nav li.collapse .app-sub-sidebar,
    .sidebar-nav li.collapse > ul {
      display: none;
    }

    .sidebar-nav li.open > ul {
      display: block;
    }

    .sidebar-nav li > a .arrow,
    .sidebar-nav li > p .arrow {
      border-color: var(--text-muted) !important;
      transition: transform 0.2s ease !important;
    }

    /* ===== MAIN CONTENT ===== */
    .markdown-section {
      max-width: 820px !important;
      margin: 0 auto !important;
      padding: 2rem 2.5rem 4rem !important;
      font-size: 1.05rem !important;
      line-height: 1.9 !important;
      color: var(--text-primary) !important;
    }

    .markdown-section h1 {
      font-weight: 900 !important;
      font-size: 2rem !important;
      border-bottom: 2px solid var(--border-color) !important;
      padding-bottom: 0.6rem !important;
      margin-top: 2.5rem !important;
      color: var(--text-primary) !important;
    }

    .markdown-section h2 {
      font-weight: 700 !important;
      font-size: 1.5rem !important;
      margin-top: 2.2rem !important;
      color: var(--accent-warm) !important;
      border-bottom: 1px solid var(--border-color) !important;
      padding-bottom: 0.4rem !important;
    }

    .markdown-section h3 {
      font-weight: 600 !important;
      font-size: 1.2rem !important;
      color: var(--accent) !important;
      margin-top: 1.8rem !important;
    }

    .markdown-section h4 {
      font-weight: 600 !important;
      color: var(--text-secondary) !important;
    }

    .markdown-section p {
      margin: 0.8rem 0 !important;
    }

    .markdown-section a {
      color: var(--accent) !important;
      text-decoration: none !important;
      border-bottom: 1px dashed rgba(88, 166, 255, 0.3) !important;
      transition: all 0.2s ease !important;
    }

    .markdown-section a:hover {
      border-bottom-color: var(--accent) !important;
      border-bottom-style: solid !important;
    }

    /* ===== IMAGES ===== */
    .markdown-section img {
      max-width: 100% !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
      margin: 1.5rem auto !important;
      display: block !important;
      transition: transform 0.3s ease, box-shadow 0.3s ease !important;
    }

    .markdown-section img:hover {
      transform: scale(1.02) !important;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6) !important;
    }

    /* ===== TABLES ===== */
    .markdown-section table {
      border-collapse: collapse !important;
      width: 100% !important;
      margin: 1rem 0 !important;
    }

    .markdown-section table th {
      background: var(--bg-secondary) !important;
      color: var(--accent) !important;
      font-weight: 600 !important;
      padding: 10px 14px !important;
      border: 1px solid var(--border-color) !important;
      font-family: var(--ui-font-family) !important;
      font-size: 0.9rem !important;
    }

    .markdown-section table td {
      padding: 10px 14px !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-secondary) !important;
    }

    .markdown-section table tr:nth-child(even) {
      background: rgba(22, 27, 34, 0.5) !important;
    }

    /* ===== BLOCKQUOTES ===== */
    .markdown-section blockquote {
      border-left: 4px solid var(--accent-warm) !important;
      background: rgba(240, 136, 62, 0.08) !important;
      padding: 1rem 1.5rem !important;
      border-radius: 0 8px 8px 0 !important;
      margin: 1rem 0 !important;
      color: var(--text-secondary) !important;
    }

    /* ===== LISTS ===== */
    .markdown-section ul, .markdown-section ol {
      padding-left: 1.5rem !important;
    }

    .markdown-section li {
      margin: 0.4rem 0 !important;
    }

    /* ===== CODE ===== */
    .markdown-section code {
      background: var(--bg-secondary) !important;
      color: var(--accent) !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
      font-size: 0.9em !important;
    }

    .markdown-section pre {
      background: var(--bg-secondary) !important;
      border-radius: 8px !important;
      border: 1px solid var(--border-color) !important;
    }

    /* ===== HORIZONTAL RULES ===== */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border-color) !important;
      margin: 2.5rem 0 !important;
    }

    /* ===== SEARCH ===== */
    .search {
      border-bottom: 1px solid var(--sidebar-border) !important;
    }

    .search input {
      background: var(--bg-secondary) !important;
      color: var(--text-primary) !important;
      border: 1px solid var(--border-color) !important;
      border-radius: 8px !important;
      padding: 8px 12px !important;
      font-family: var(--ui-font-family) !important;
    }

    .search .results-panel {
      background: var(--bg-card) !important;
      border: 1px solid var(--border-color) !important;
    }

    .search .matching-post {
      border-bottom: 1px solid var(--border-color) !important;
    }

    /* ===== CHARACTER GALLERY (Custom) ===== */
    .character-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
      margin: 2rem 0;
    }

    .char-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
    }

    .char-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .char-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }

    .char-card .char-name {
      padding: 0.8rem;
      font-family: var(--base-font-family);
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .char-card .char-role {
      padding: 0 0.8rem 0.8rem;
      font-family: var(--ui-font-family);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 1rem 1.2rem 3rem !important;
        font-size: 1rem !important;
      }
      .character-gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
      }
    }

    /* ===== COVER PAGE ===== */
    section.cover {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a1e2e 100%) !important;
      color: #e6edf3 !important;
    }

    section.cover .cover-main {
      color: #e6edf3 !important;
    }

    section.cover h1 {
      font-family: 'Noto Serif TC', serif !important;
      font-weight: 900 !important;
      color: #f0883e !important;
      font-size: 2.8rem !important;
      border: none !important;
    }

    section.cover blockquote {
      border-left: none !important;
      background: none !important;
    }

    section.cover blockquote p {
      color: #8b949e !important;
      font-size: 1.2rem !important;
    }

    /* Primary button (first link) */
    section.cover .cover-main > p:last-child a:first-child {
      display: inline-block !important;
      padding: 12px 36px !important;
      border-radius: 8px !important;
      background: #58a6ff !important;
      color: #0d1117 !important;
      border: 2px solid #58a6ff !important;
      font-weight: 600 !important;
      font-size: 1.1rem !important;
      text-decoration: none !important;
      margin-right: 12px !important;
      transition: all 0.3s ease !important;
    }

    section.cover .cover-main > p:last-child a:first-child:hover {
      background: #79b8ff !important;
      border-color: #79b8ff !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 4px 16px rgba(88, 166, 255, 0.3) !important;
    }

    /* Secondary button (second link) */
    section.cover .cover-main > p:last-child a:last-child {
      display: inline-block !important;
      padding: 12px 36px !important;
      border-radius: 8px !important;
      background: transparent !important;
      color: #f0883e !important;
      border: 2px solid #f0883e !important;
      font-weight: 600 !important;
      font-size: 1.1rem !important;
      text-decoration: none !important;
      transition: all 0.3s ease !important;
    }

    section.cover .cover-main > p:last-child a:last-child:hover {
      background: #f0883e !important;
      color: #0d1117 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 4px 16px rgba(240, 136, 62, 0.3) !important;
    }
  </style>
</head>
<body>
  <div id="app">正在載入中...</div>

  <script>
    window.$docsify = {
      repo: 'https://github.com/PascalHuang0611/novel-writing',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      executeScript: true,
      sidebarDisplayLevel: 0,
      
      search: {
        placeholder: '🔍 搜尋角色、設定、關鍵字...',
        noData: '找不到結果',
        paths: 'auto',
        depth: 3,
      },

      pagination: {
        previousText: '← 上一篇',
        nextText: '下一篇 →',
        crossChapter: true,
      },

      formatUpdated: '{YYYY}/{MM}/{DD}',

      plugins: [
        function(hook) {
          hook.doneEach(function() {
            document.title = 'PascalDream — 創作工坊';
            document.querySelectorAll('.character-gallery img').forEach(img => {
              img.style.borderRadius = '12px 12px 0 0';
            });
            // Version badge
            if (!document.getElementById('version-badge')) {
              var badge = document.createElement('div');
              badge.id = 'version-badge';
              badge.textContent = 'v0.1.2';
              badge.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#161b22;color:#8b949e;border:1px solid #30363d;border-radius:6px;padding:4px 10px;font-family:Inter,sans-serif;font-size:0.75rem;z-index:99;opacity:0.7;transition:opacity 0.2s;cursor:default;';
              badge.onmouseenter = function() { this.style.opacity = '1'; };
              badge.onmouseleave = function() { this.style.opacity = '0.7'; };
              document.body.appendChild(badge);
            }
          });
        }
      ]
    }
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
